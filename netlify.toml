[build]
  command = "npm run build"
  publish = "dist"

# Configuración de Caché para LCP (Largest Contentful Paint)
# Guardamos imágenes y fuentes en caché por 1 año para que la web vuele en segundas visitas.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Seguridad Básica (XSS Protection)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
